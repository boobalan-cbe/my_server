<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Server Level2 Premium</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box
}

body{
  font-family:system-ui,Arial,sans-serif;
  color:#fff;
  overflow-x:hidden;
  background:linear-gradient(-45deg,#0f172a,#1e3a8a,#111827,#312e81);
  background-size:400% 400%;
  animation:bg 18s ease infinite;
  min-height:100vh
}

@keyframes bg
{
  0%{background-position:0 50%}
  50%{background-position:100% 50%}
  100%{background-position:0 50%}
}
body:before,body:after
{
  content:"";
  position:fixed;
  width:260px;
  height:260px;
  border-radius:50%;
  filter:blur(80px);
  opacity:.35;
  pointer-events:none;
  animation:float 10s ease-in-out infinite
}
body:before
{
  background:#38bdf8;
  top:-60px;
  left:-60px
} 
body:after
{
  background:#a855f7;
  right:-60px;
  bottom:-60px;
  animation-delay:3s
}
@keyframes float
{
  50%{transform:translateY(35px) translateX(25px)}
}
header
{
  position:sticky;
  top:0;z-index:5;
  padding:16px;
  background:rgba(255,255,255,.08);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,.12)
}
.row
{
  display:flex;
  gap:10px;
  flex-wrap:wrap
}
input
{
  flex:1;
  padding:12px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,.1);
  color:#fff
}
button
{
  padding:12px 18px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:#fff;
  cursor:pointer;
  transition:.25s
}
button:hover
{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 10px 30px rgba(59,130,246,.4)
}
.stats
{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:14px;
  padding:18px
}
.stat,.card,#path,.upload-panel
{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px
}
.stat
{
  padding:16px
}
#path
{
  margin:0 18px;
  padding:12px
}
#search
{
  margin:18px;
  width:calc(100% - 36px)
}
#files
{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:16px;
  padding:18px
}
.card
{
  padding:18px;
  transition:.3s;
  position:relative;
  overflow:hidden;
  user-select:none
}
.card:before
{
  content:"";
  position:absolute;
  inset:-120%;
  background:linear-gradient(45deg,transparent,rgba(255,255,255,.15),transparent);
  transition:.7s
}
.card:hover:before
{
  inset:120%
}
.card:hover
{
  transform:translateY(-8px)
}
.icon
{
  font-size:46px
}
.actions
{
  display:flex;
  gap:8px;
  margin-top:12px
}
.badge
{
  display:inline-block;
  margin-top:8px;
  font-size:12px;
  background:#1d4ed8;
  padding:4px 8px;
  border-radius:20px
}
#loader
{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:20
}
.spin
{
  width:70px;
  height:70px;
  border:6px solid rgba(255,255,255,.2);
  border-top-color:#60a5fa;
  border-radius:50%;
  animation:r 1s linear infinite
}
@keyframes r
{
  to{transform:rotate(360deg)}
}
#toast
{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;border-radius:30px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
  display:none;
  z-index:30
}
#modal
{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:25
}
#viewer img,#viewer video
{
  max-width:96vw;max-height:94vh
}
.close
{
  position:absolute;
  top:15px;
  right:15px
}
.upload-panel
{
  margin:18px;
  padding:16px
}
.dropzone
{
  border:2px dashed rgba(255,255,255,.35);
  border-radius:18px;
  padding:28px;
  text-align:center;
  transition:.25s;
  cursor:pointer;
  background:rgba(255,255,255,.05)
}
.dropzone.dragover
{
  border-color:#60a5fa;
  background:rgba(59,130,246,.15)
}
.progress-wrap
{
  margin-top:14px
}
.progressbar
{
  width:100%;
  height:12px;
  background:rgba(255,255,255,.14);
  border-radius:999px;
  overflow:hidden
}
.progress
{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#22c55e,#3b82f6);
  transition:width .1s
}
.upload-meta
{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
  font-size:14px
}
.hidden
{
  display:none
}
.context-menu
{
  position:fixed;
  min-width:220px;
  background:rgba(15,23,42,.96);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  box-shadow:0 18px 40px rgba(0,0,0,.35);
  padding:8px;
  z-index:50;
  display:none
}
.context-menu button
{
  width:100%;
  text-align:left;
  background:transparent;
  box-shadow:none;
  padding:10px 12px;
  border-radius:12px;
  margin:2px 0
}
.context-menu button:hover
{
  background:rgba(255,255,255,.08);
  transform:none;
  box-shadow:none
}
.context-sep
{
  height:1px;
  background:rgba(255,255,255,.1);
  margin:6px 0
}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div></div>
<div id="contextMenu" class="context-menu">
  <button onclick="menuAction('open')">Open</button>
  <button onclick="menuAction('download')">Download</button>
  <button onclick="menuAction('rename')">Rename</button>
  <button onclick="menuAction('copy')">Copy</button>
  <button onclick="menuAction('move')">Move</button>
  <button onclick="menuAction('share')">Share</button>
  <button onclick="menuAction('delete')">Delete</button>
  <div class="context-sep"></div>
  <button onclick="menuAction('properties')">Properties</button>
</div>

<header>
<h2>☁️ My Cloud</h2>
<div class="row">
<input id="server" value="10.146.177.27:8080">
<button onclick="connect()">🔌 Connect</button>
</div>
</header>

<div class="upload-panel">
  <h3>Upload</h3>
  <div id="dropzone" class="dropzone">
    <strong>Drag & Drop</strong>
    <div style="margin:10px 0">Drop files here</div>
    <div>or</div>
    <div style="margin-top:10px">
      <button type="button" onclick="browseFiles()">Browse Files</button>
    </div>
    <input id="fileInput" type="file" class="hidden" multiple>
  </div>

  <div class="progress-wrap">
    <div class="progressbar"><div id="progress" class="progress"></div></div>
    <div class="upload-meta">
      <span id="remaining">Remaining time: 0s</span>
      <span id="speed">Upload speed: 0 KB/s</span>
      <button id="cancelBtn" type="button" onclick="cancelUpload()" disabled>Cancel upload</button>
    </div>
  </div>
</div>

<div class="stats">
<div class="stat"><h3 id="count">0</h3><small>Files/Folders</small></div>
</div>
<input id="search" placeholder="🔍 Search..." oninput="filterCards()">
<div id="path">/</div>
<div id="files"></div>
<div id="toast"></div>
<div id="modal" onclick="if(event.target.id==='modal')closeViewer()"><button class="close" onclick="closeViewer()">✕</button><div id="viewer"></div></div>

<script>
let SERVER="",currentPath="",uploadXhr=null,uploadStart=0,currentItem=null,clipboardPath="",clipboardAction="";
const $=i=>document.getElementById(i);

function toast(t){const e=$("toast");e.textContent=t;e.style.display="block";setTimeout(()=>e.style.display="none",1800);}
function loadState(v){$("loader").style.display=v?"flex":"none";}
function connect(){SERVER=$("server").value.replace(/^https?:\/\//,"");loadFolder("");}
function browseFiles(){$("fileInput").click();}

function fileIcon(name){
  const ext=name.split(".").pop().toLowerCase();
  switch(ext){
    case "pdf": return "🟥";
    case "doc":
    case "docx": return "🟦";
    case "xls":
    case "xlsx": return "🟩";
    case "ppt":
    case "pptx": return "🟧";
    case "zip":
    case "rar":
    case "7z": return "🟨";
    case "mp3":
    case "wav":
    case "ogg": return "🎵";
    case "mp4":
    case "mkv":
    case "webm": return "🎬";
    case "apk": return "🤖";
    case "txt": return "📄";
    case "json": return "{}";
    case "html":
    case "htm": return "🌐";
    case "js": return "⚡";
    case "css": return "🎨";
    default: return "📄";
  }
}

async function loadFolder(path){
  currentPath=path;
  $("path").textContent="/"+path;
  loadState(true);
  try{
    const r=await fetch(`http://${SERVER}/api/files?path=${encodeURIComponent(path)}`);
    const d=await r.json();
    $("files").innerHTML="";
    $("count").textContent=d.length;

    if(path){
      let b=document.createElement("div");
      b.className="card";
      b.innerHTML="<div class=icon>⬅️</div><b>Back</b>";
      b.onclick=()=>{
        let p=path.split('/');
        p.pop();
        loadFolder(p.join('/'));
      };
      $("files").appendChild(b);
    }

    d.forEach(f=>{
      let c=document.createElement("div");
      c.className="card";
      c.dataset.name=f.name.toLowerCase();

      if(f.type==="folder"){
        c.innerHTML=`
<div class='icon'>📁</div><b>${f.name}</b>
<div class='badge'>Folder</div>`;
        c.onclick=()=>loadFolder(f.path);
      }else{
        let icon=fileIcon(f.name);
        let ext=f.name.split('.').pop().toUpperCase();
        c.innerHTML=`
<div class='icon'>${icon}</div><b>${f.name}</b>
<div class='badge'>${ext}</div>
<div class='actions'><button>View 👁️</button><button>Get ⬇️</button></div>`;
        c.querySelectorAll("button")[0].onclick=(e)=>{e.stopPropagation();preview(f.path)};
        c.querySelectorAll("button")[1].onclick=(e)=>{e.stopPropagation();open(`http://${SERVER}/api/download?path=${encodeURIComponent(f.path)}`)};
      }

      c.addEventListener("contextmenu",(e)=>{
        e.preventDefault();
        currentItem=f;
        showMenu(e.pageX,e.pageY);
      });

      $("files").appendChild(c);
    });

    toast("Loaded");
  }catch(e){
    $("files").innerHTML="<div class='card'>Connection failed.</div>";
    toast("Error");
  }
  loadState(false);
}

function filterCards(){
  let q=$("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    if(!c.dataset.name)return;
    c.style.display=c.dataset.name.includes(q)?"":"none";
  });
}

function preview(p){
  viewer.innerHTML="";
  let u=`http://${SERVER}/api/view?path=${encodeURIComponent(p)}`;
  if(/\.(png|jpg|jpeg|gif|webp)$/i.test(p)){
    let i=new Image();
    i.src=u;
    viewer.appendChild(i);
  }else if(/\.(mp4|webm|mkv)$/i.test(p)){
    let v=document.createElement("video");
    v.src=u;
    v.controls=true;
    v.autoplay=true;
    viewer.appendChild(v);
  }else{
    open(u);
    return;
  }
  modal.style.display="flex";
}

function closeViewer(){modal.style.display="none";viewer.innerHTML=""}

function updateUploadUI(percent, loaded, total){
  $("progress").style.width=percent+"%";
  const elapsed=(Date.now()-uploadStart)/1000;
  const speed=loaded/Math.max(elapsed,0.1);
  const remainingBytes=total-loaded;
  const eta=remainingBytes/Math.max(speed,1);
  $("speed").textContent="Upload speed: "+(speed/1024).toFixed(1)+" KB/s";
  $("remaining").textContent="Remaining time: "+Math.ceil(eta)+"s";
}

function uploadFile(file){
  if(!SERVER){toast("Connect first");return;}
  const form=new FormData();
  form.append("file",file);
  form.append("path",currentPath);

  uploadXhr=new XMLHttpRequest();
  uploadStart=Date.now();
  $("cancelBtn").disabled=false;
  $("progress").style.width="0%";
  $("remaining").textContent="Remaining time: calculating...";
  $("speed").textContent="Upload speed: 0 KB/s";

  uploadXhr.upload.onprogress=function(e){
    if(!e.lengthComputable)return;
    updateUploadUI((e.loaded/e.total)*100,e.loaded,e.total);
  };

  uploadXhr.onload=function(){
    $("cancelBtn").disabled=true;
    $("fileInput").value="";
    $("remaining").textContent="Remaining time: 0s";
    $("speed").textContent="Upload speed: 0 KB/s";
    $("progress").style.width="100%";
    if(uploadXhr.status>=200 && uploadXhr.status<300){
      toast("Upload complete");
      loadFolder(currentPath);
    }else{
      toast("Upload failed: " + uploadXhr.responseText);
    }
  };

  uploadXhr.onerror=function(){
    $("cancelBtn").disabled=true;
    $("fileInput").value="";
    toast("Upload failed");
  };

  uploadXhr.onabort=function(){
    $("cancelBtn").disabled=true;
    $("fileInput").value="";
    $("progress").style.width="0%";
    $("remaining").textContent="Remaining time: 0s";
    $("speed").textContent="Upload speed: 0 KB/s";
    toast("Upload cancelled");
  };

  uploadXhr.open("POST",`http://${SERVER}/api/upload`);
  uploadXhr.send(form);
}

function startUpload(files){
  if(!files || !files.length)return;
  uploadFile(files[0]);
}

function cancelUpload(){
  if(uploadXhr) uploadXhr.abort();
}

const dropzone=$("dropzone");
dropzone.addEventListener("click",(e)=>{
  if(e.target.tagName!=="BUTTON") $("fileInput").click();
});
$("fileInput").addEventListener("change",(e)=>startUpload(e.target.files));
dropzone.addEventListener("dragover",(e)=>{
  e.preventDefault();
  dropzone.classList.add("dragover");
});
dropzone.addEventListener("dragleave",()=>{
  dropzone.classList.remove("dragover");
});
dropzone.addEventListener("drop",(e)=>{
  e.preventDefault();
  dropzone.classList.remove("dragover");
  startUpload(e.dataTransfer.files);
});

document.addEventListener("click",()=>hideMenu());

function showMenu(x,y){
  const m=$("contextMenu");
  m.style.display="block";
  const w=m.offsetWidth||220;
  const h=m.offsetHeight||320;
  m.style.left=Math.min(x,window.innerWidth-w-8)+"px";
  m.style.top=Math.min(y,window.innerHeight-h-8)+"px";
}

function hideMenu(){
  $("contextMenu").style.display="none";
}

function menuAction(action){
  hideMenu();
  if(!currentItem) return;
  const p=currentItem.path;

  if(action==="open"){
    if(currentItem.type==="folder") loadFolder(p);
    else preview(p);
    return;
  }
  if(action==="download"){
    open(`http://${SERVER}/api/download?path=${encodeURIComponent(p)}`);
    return;
  }
  if(action==="rename"){
    const next=prompt("New name:", currentItem.name);
    if(!next || next===currentItem.name) return;
    fetch(`http://${SERVER}/api/rename`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({path:p,new_name:next})
    }).then(r=>r.json().then(d=>({ok:r.ok,data:d}))).then(res=>{
      toast(res.ok?"Renamed":"Rename failed");
      if(res.ok) loadFolder(currentPath);
    }).catch(()=>toast("Rename failed"));
    return;
  }
  if(action==="copy"){
    clipboardPath=p;
    clipboardAction="copy";
    toast("Copied");
    return;
  }
  if(action==="move"){
    clipboardPath=p;
    clipboardAction="move";
    toast("Move selected");
    return;
  }
  if(action==="share"){
    navigator.clipboard.writeText(`http://${SERVER}/api/download?path=${encodeURIComponent(p)}`);
    toast("Share link copied");
    return;
  }
  if(action==="delete"){
    if(!confirm("Delete this item?")) return;
    fetch(`http://${SERVER}/api/delete`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({path:p})
    }).then(r=>r.json().then(d=>({ok:r.ok,data:d}))).then(res=>{
      toast(res.ok?"Deleted":"Delete failed");
      if(res.ok) loadFolder(currentPath);
    }).catch(()=>toast("Delete failed"));
    return;
  }
  if(action==="properties"){
    toast(`${currentItem.type}: ${currentItem.name}`);
  }
}
</script>
</body>
</html>
